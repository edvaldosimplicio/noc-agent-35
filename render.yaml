services:
  - type: web
    name: noc-agent-35
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: "file:./data/noc-agent.db"
      - key: PORT
        value: 3000
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DASHBOARD_PASSWORD
        generateValue: true
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: EVOLUTION_API_URL
        value: http://localhost:8080
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        value: noc-agent
      - key: ADMIN_WHATSAPP
        value: "5511999999999"
      - key: ZABBIX_WEBHOOK_TOKEN
        generateValue: true
      - key: ZABBIX_URL
        value: http://zabbix.example.com
      - key: AUTHORIZED_NUMBERS
        value: "5511999999999"
